<!DOCTYPE html>
<html>
<head>
    <title>Live Detection - Drowsiness System</title>
    <style>
        :root { --dark-wine: #580000; }
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; box-sizing: border-box; }
        
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/images/img.gif');
            background-size: cover; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 20px;
            text-align: center; width: 90%; max-width: 600px; border-top: 6px solid var(--dark-wine);
        }

        .video-box {
            width: 100%; height: 350px; background: #000; border-radius: 15px;
            margin: 20px 0; border: 3px solid var(--dark-wine);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        #video_feed { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder { color: #888; font-style: italic; }

        .btn {
            padding: 12px 30px; border: none; border-radius: 30px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s; margin: 5px;
        }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: var(--dark-wine); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: var(--dark-wine);">YOLO Live Monitor</h2>
        <div class="video-box">
            <span id="status" class="placeholder">System Standby...</span>
            <img id="video_feed" src="">
        </div>
        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startStream()">Start</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopStream()" disabled>Stop</button>
        </div>
        <br><a href="{{ url_for('logout') }}" style="color:var(--dark-wine); text-decoration:none;">Logout</a>
    </div>

    <script>
        function startStream() {
            document.getElementById('video_feed').src = "{{ url_for('video_feed') }}";
            document.getElementById('video_feed').style.display = "block";
            document.getElementById('status').style.display = "none";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        }
        function stopStream() {
            document.getElementById('video_feed').src = "";
            document.getElementById('video_feed').style.display = "none";
            document.getElementById('status').style.display = "block";
            document.getElementById('status').innerText = "System Stopped";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }
    </script>
</body>
</html>
