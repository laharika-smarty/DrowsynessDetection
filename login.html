<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    -webkit-tap-highlight-color: transparent !important;
    outline: none !important;
}

body { 
    background: #f4f4f4; 
    font-family: 'Segoe UI'; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
}

.card { 
    background: white; 
    padding: 30px; 
    border-radius: 15px; 
    width: 100%; 
    max-width: 350px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border-top: 5px solid #bf953f; 
    text-align: center;
}

h2 { color: #8a6d00; }

input { 
    width: 100%; 
    padding: 12px; 
    margin: 10px 0; 
    border: 1px solid #ddd; 
    border-radius: 8px; 
}

button { 
    width: 100%; 
    padding: 12px; 
    background: linear-gradient(45deg, #bf953f, #b38728); 
    color: white; 
    border: none; 
    border-radius: 8px; 
    margin-top: 10px;
    cursor: pointer;
}

video, img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

#captureBtn { display:none; }

#previewContainer {
    position: relative;
    display: none;
}

#overlayText {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-weight: bold;
}

#processingSpinner {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.6);
    color:white;
    padding:10px 15px;
    border-radius:8px;
}
.alert {
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    font-weight: bold;
}

.success {
    background: #d4edda;
    color: #155724;
}

.warning {
    background: #fff3cd;
    color: #856404;
}

.danger {
    background: #f8d7da;
    color: #721c24;
}
</style>
</head>

<body>

<div class="card">
<h2>Login</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<!-- NORMAL LOGIN -->
<form method="POST" id="normalLogin">
<input type="text" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login Normally</button>
</form>

<hr>

<!-- FACE LOGIN -->
<input type="text" id="faceEmail" placeholder="Enter Email for Face Login">

<button id="faceBtn" onclick="startCamera()">Login with Face</button>

<video id="video" autoplay playsinline style="display:none;"></video>

<button id="captureBtn" onclick="captureImage()">Capture & Verify</button>

<div id="previewContainer">
<img id="capturedImage">
<div id="overlayText"></div>
<div id="processingSpinner">Processing...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<div style="margin-top: 20px; font-size: 0.9rem; color: #555; text-align: center;">
    New user? <a href="{{ url_for('registration') }}" style="color: #8a6d00; text-decoration: none; font-weight: bold;">Sign Up</a>
</div>
<a href="{{ url_for('home') }}" style="color: #8a6d00; text-decoration: none; font-weight: bold;">HOME🏠</a>

</div>

<script>

let video = document.getElementById("video");

function startCamera(){

document.getElementById("faceBtn").style.display="none";
video.style.display="block";
document.getElementById("captureBtn").style.display="block";

navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})
.then(stream=>{
video.srcObject=stream;
})
.catch(()=>{
alert("Camera access denied");
});

}

function captureImage(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

let stream=video.srcObject;
stream.getTracks().forEach(track=>track.stop());

video.style.display="none";
document.getElementById("captureBtn").style.display="none";

let imageData=canvas.toDataURL("image/png");

document.getElementById("capturedImage").src=imageData;
document.getElementById("previewContainer").style.display="block";

document.getElementById("overlayText").innerHTML="";
document.getElementById("processingSpinner").style.display="block";

let email=document.getElementById("faceEmail").value;

fetch("/face_login",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:imageData,
email:email
})

})
.then(res=>res.json())
.then(data=>{

document.getElementById("processingSpinner").style.display="none";

if(data.status==="success"){

document.getElementById("overlayText").style.background="green";
document.getElementById("overlayText").innerHTML="✅ Valid Face";

setTimeout(()=>{
window.location.href="/main_project";
},1200);

}
else{

document.getElementById("overlayText").style.background="red";
document.getElementById("overlayText").innerHTML="❌ Invalid Face";

setTimeout(()=>{
location.reload();
},2000);

}

});

}

</script>

</body>
</html>
